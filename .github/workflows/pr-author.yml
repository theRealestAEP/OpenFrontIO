name: 🧼 PR

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write

jobs:
  auto-assign:
    name: Auto-assign author
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: toshimaru/auto-author-assign@4d585cc37690897bd9015942ed6e766aa7cdb97f
